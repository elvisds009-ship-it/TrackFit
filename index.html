<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>TrackFit</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--bg2:#0d0d1a;
  --surface:rgba(255,255,255,0.03);--surface2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);--border-hover:rgba(255,255,255,0.18);
  --gold:#c9a84c;--gold2:#e8cc7a;--gold-glow:rgba(201,168,76,0.15);
  --platinum:#e8e8f0;--muted:rgba(232,232,240,0.4);--muted2:rgba(232,232,240,0.25);
  --text:#e8e8f0;--red:#e05c5c;--green:#5ce0a0;
  --font-display:'Cormorant Garamond',serif;--font-body:'Outfit',sans-serif;
  --radius:2px;--transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
  --bottom-nav-h: 64px;
}
[data-theme="light"]{
  --bg:#f7f5ef;--bg2:#eeebe3;
  --surface:rgba(0,0,0,0.025);--surface2:rgba(0,0,0,0.05);
  --border:rgba(0,0,0,0.1);--border-hover:rgba(0,0,0,0.22);
  --gold:#9e7320;--gold2:#7a5518;--gold-glow:rgba(158,115,32,0.12);
  --platinum:#1a1828;--muted:rgba(26,24,40,0.45);--muted2:rgba(26,24,40,0.25);
  --text:#1a1828;--red:#b02020;--green:#1a7a50;
}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg);color:var(--text);font-family:var(--font-body);
  min-height:100vh;overflow-x:hidden;
  transition:background 0.35s ease,color 0.35s ease;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%,rgba(201,168,76,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 110%,rgba(100,80,200,0.05) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
[data-theme="light"] body::before{
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%,rgba(201,168,76,0.09) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 110%,rgba(100,80,200,0.04) 0%,transparent 60%);
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.025;pointer-events:none;z-index:0;
}
[data-theme="light"] body::after{opacity:0.01;}
#root{position:relative;z-index:1}
.app{max-width:900px;margin:0 auto;padding:0 24px 100px}

/* ── LOGIN SCREEN ── */
.login-screen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;position:relative;
}
.login-logo{font-family:var(--font-display);font-size:3.5rem;font-weight:300;letter-spacing:10px;color:var(--platinum);text-align:center;margin-bottom:4px;}
.login-logo span{color:var(--gold);}
.login-sub{font-size:.6rem;color:var(--muted);letter-spacing:6px;text-transform:uppercase;text-align:center;margin-bottom:48px;}
.login-box{width:100%;max-width:440px;}
.accounts-grid{display:grid;gap:10px;margin-bottom:20px;}
.account-card{
  background:var(--surface);border:1px solid var(--border);padding:18px 22px;
  border-radius:var(--radius);cursor:pointer;transition:var(--transition);
  display:flex;align-items:center;gap:16px;
}
.account-card:hover{border-color:rgba(201,168,76,0.35);background:var(--surface2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.15);}
.account-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--gold),rgba(201,168,76,0.4));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:1.5rem;font-weight:500;color:#1a1828;flex-shrink:0;}
.account-name{font-family:var(--font-display);font-size:1.4rem;font-weight:400;color:var(--platinum);letter-spacing:1px;}
.account-sub{font-size:.6rem;color:var(--muted);letter-spacing:2px;margin-top:2px;}
.account-arrow{color:var(--muted2);margin-left:auto;font-size:1.2rem;}

/* PIN INPUT */
.pin-screen{text-align:center;}
.pin-title{font-family:var(--font-display);font-size:2rem;font-weight:300;letter-spacing:4px;color:var(--platinum);margin-bottom:6px;}
.pin-sub{font-size:.62rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;}
.pin-dots{display:flex;gap:16px;justify-content:center;margin-bottom:32px;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);transition:var(--transition);}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px rgba(201,168,76,0.5);}
.pin-dot.error{background:var(--red);border-color:var(--red);animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto;}
.pin-key{
  height:62px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  font-family:var(--font-display);font-size:1.8rem;font-weight:400;color:var(--platinum);
  cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.pin-key:hover{border-color:rgba(201,168,76,0.3);background:var(--surface2);}
.pin-key:active{transform:scale(0.95);background:rgba(201,168,76,0.1);}
.pin-key.zero{grid-column:2;}
.pin-key.del{background:transparent;border-color:transparent;color:var(--muted);font-size:1.2rem;}
.pin-key.del:hover{color:var(--red);}

/* CREATE ACCOUNT */
.create-account{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:100%;max-width:440px;}
.create-title{font-family:var(--font-display);font-size:1.8rem;font-weight:300;letter-spacing:3px;color:var(--platinum);margin-bottom:24px;}
.login-step-indicator{display:flex;gap:8px;margin-bottom:28px;justify-content:center;}
.login-step{width:28px;height:2px;border-radius:1px;background:var(--border);transition:var(--transition);}
.login-step.active{background:var(--gold);}

/* HEADER */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 0 16px;border-bottom:1px solid var(--border);
  margin-bottom:40px;position:relative;gap:12px;flex-wrap:wrap;
}
.header::after{content:'';position:absolute;bottom:-1px;left:0;width:80px;height:1px;background:linear-gradient(90deg,var(--gold),transparent);}
.header-left{display:flex;flex-direction:column;flex-shrink:0;}
.header-center{flex:1;display:flex;justify-content:center;min-width:0;}
.header-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.logo{font-family:var(--font-display);font-size:1.8rem;font-weight:300;letter-spacing:6px;color:var(--platinum);cursor:pointer;}
.logo span{color:var(--gold);}
.logo-sub{font-size:.55rem;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-top:1px;font-weight:300;}

/* CTRL BUTTONS */
.ctrl-btn{
  display:inline-flex;align-items:center;justify-content:center;
  height:34px;min-width:34px;padding:0 10px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--muted);font-size:.72rem;cursor:pointer;
  transition:var(--transition);border-radius:var(--radius);
  font-family:var(--font-body);font-weight:500;letter-spacing:1.5px;
}
.ctrl-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-glow);}
.ctrl-btn.is-active{border-color:var(--gold);color:var(--gold);background:var(--gold-glow);}
.ctrl-sep{width:1px;height:20px;background:var(--border);margin:0 2px;flex-shrink:0;}
.friends-dot{position:absolute;top:-3px;right:-3px;width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:.7rem;color:var(--muted);letter-spacing:1px;flex-wrap:wrap;}
.bc-link{color:var(--gold);cursor:pointer;transition:var(--transition);opacity:.8;}
.bc-link:hover{opacity:1;}
.bc-sep{color:var(--muted2);}

/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 24px;border:none;cursor:pointer;
  font-family:var(--font-body);font-size:.72rem;font-weight:500;
  letter-spacing:2px;text-transform:uppercase;
  transition:var(--transition);position:relative;overflow:hidden;border-radius:var(--radius);
  min-height:44px;
}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .2s;}
.btn:hover::after{background:rgba(255,255,255,0.06);}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none;}
.btn-primary{background:linear-gradient(135deg,var(--gold),#a8862e);color:#1a1828;font-weight:600;box-shadow:0 0 30px rgba(201,168,76,0.2);}
.btn-primary:hover{box-shadow:0 0 50px rgba(201,168,76,0.35);transform:translateY(-1px);}
.btn-ghost{background:var(--surface);color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--border-hover);color:var(--text);}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(224,92,92,0.3);}
.btn-danger:hover{background:rgba(224,92,92,0.08);}
.btn-sm{padding:7px 16px;font-size:.65rem;min-height:36px;}
.btn-icon{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:.9rem;padding:8px;transition:var(--transition);min-width:36px;min-height:36px;display:inline-flex;align-items:center;justify-content:center;}
.btn-icon:hover{color:var(--red);transform:scale(1.1);}
.btn-icon-sm{padding:6px;min-width:32px;min-height:32px;}

/* INPUTS */
.input{
  width:100%;background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-family:var(--font-body);font-size:.8rem;font-weight:300;
  padding:13px 16px;outline:none;transition:var(--transition);border-radius:var(--radius);
  min-height:48px;
}
.input:focus{border-color:var(--gold);background:rgba(201,168,76,0.04);box-shadow:0 0 0 3px rgba(201,168,76,0.06);}
.input::placeholder{color:var(--muted2);}
.input-row{display:flex;gap:8px;align-items:flex-end;}
label{display:block;font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:400;}

/* PAGE */
.page-title{
  font-family:var(--font-display);font-size:3.2rem;font-weight:300;
  letter-spacing:3px;line-height:1;margin-bottom:6px;
  background:linear-gradient(135deg,var(--platinum) 60%,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.page-sub{font-size:.65rem;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-bottom:36px;font-weight:300;}
.accent-bar{width:32px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin-bottom:16px;}

/* CARDS */
.card{
  background:var(--surface);border:1px solid var(--border);padding:24px 28px;
  margin-bottom:12px;transition:var(--transition);border-radius:var(--radius);
  position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.3),transparent);opacity:0;transition:opacity .35s;}
.card-click{cursor:pointer;}
.card-click:hover{border-color:var(--border-hover);background:var(--surface2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.15),0 0 0 1px rgba(201,168,76,0.05);}
.card-click:hover::before{opacity:1;}
.card-click:active{transform:translateY(0);}
.card-header{display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:var(--font-display);font-size:1.6rem;font-weight:400;letter-spacing:1px;color:var(--platinum);}

/* TAGS */
.tag{display:inline-flex;align-items:center;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:.58rem;letter-spacing:2px;padding:3px 10px;text-transform:uppercase;margin-right:6px;border-radius:20px;font-weight:400;}
.tag-gold{background:rgba(201,168,76,0.08);border-color:rgba(201,168,76,0.25);color:var(--gold2);}
[data-theme="light"] .tag-gold{background:rgba(158,115,32,0.1);border-color:rgba(158,115,32,0.3);}

/* DAYS GRID */
.days-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:36px;}
.day-card{background:var(--surface);border:1px solid var(--border);padding:22px 20px 18px;cursor:pointer;transition:var(--transition);position:relative;overflow:hidden;min-height:96px;border-radius:var(--radius);}
.day-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent);transform:scaleX(0);transform-origin:left;transition:transform .35s cubic-bezier(.4,0,.2,1);}
.day-card:hover{border-color:rgba(201,168,76,0.25);background:var(--surface2);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.15);}
.day-card:hover::after{transform:scaleX(1);}
.day-card:active{transform:translateY(0);}
.day-num-bg{position:absolute;bottom:-10px;right:8px;font-family:var(--font-display);font-size:4.5rem;font-weight:300;color:rgba(255,255,255,0.03);line-height:1;transition:var(--transition);pointer-events:none;letter-spacing:-2px;}
[data-theme="light"] .day-num-bg{color:rgba(0,0,0,0.04);}
.day-card:hover .day-num-bg{color:rgba(201,168,76,0.08);}
.day-card-name{font-size:.75rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;color:var(--platinum);}
.day-card-count{font-size:.62rem;color:var(--muted);font-weight:300;}

/* EXERCISE ROW */
.exo-row{display:flex;align-items:center;justify-content:space-between;padding:18px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:var(--transition);}
.exo-row:last-child{border-bottom:none;}
.exo-row:hover{padding-left:10px;}
.exo-row:hover .exo-arrow{color:var(--gold);transform:translateX(3px);}
.exo-name{font-size:.82rem;font-weight:500;letter-spacing:.5px;color:var(--platinum);}
.exo-info{font-size:.62rem;color:var(--muted);margin-top:3px;font-weight:300;}
.exo-arrow{color:var(--muted2);transition:var(--transition);font-size:.8rem;}

/* STATS */
.stats-row{display:flex;gap:10px;margin-bottom:32px;flex-wrap:wrap;}
.stat-box{background:var(--surface);border:1px solid var(--border);padding:18px 22px;flex:1;min-width:80px;border-radius:var(--radius);transition:var(--transition);position:relative;overflow:hidden;}
.stat-box::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:linear-gradient(180deg,var(--gold),transparent);opacity:.4;}
.stat-box:hover{border-color:rgba(201,168,76,0.2);transform:translateY(-2px);}
.stat-value{font-family:var(--font-display);font-size:2.2rem;font-weight:400;color:var(--gold2);letter-spacing:1px;line-height:1;}
.stat-unit{font-size:1rem;color:var(--gold);opacity:.7;}
.stat-label{font-size:.58rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:6px;font-weight:300;}

/* LOG TABLE */
.log-table{width:100%;border-collapse:collapse;margin-bottom:16px;}
.log-table th{font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);font-weight:400;}
.log-table td{padding:12px 12px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:.78rem;font-weight:300;}
[data-theme="light"] .log-table td{border-bottom:1px solid rgba(0,0,0,0.04);}
.log-table tr:last-child td{border-bottom:none;}
.log-table .num{font-weight:500;color:var(--gold2);}

/* HISTORY */
.history-session{border:1px solid var(--border);padding:20px 24px;margin-bottom:10px;background:var(--surface);border-radius:var(--radius);transition:var(--transition);animation:slideIn .3s ease both;}
.history-session:hover{border-color:var(--border-hover);}
.history-date{font-size:.62rem;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-weight:400;}

/* PR BADGE */
.pr-badge{background:linear-gradient(135deg,var(--gold),#a8862e);color:#1a1828;font-size:.5rem;font-weight:700;letter-spacing:1.5px;padding:3px 8px;border-radius:20px;text-transform:uppercase;box-shadow:0 0 12px rgba(201,168,76,0.4);animation:prPulse 2s ease infinite;}
@keyframes prPulse{0%,100%{box-shadow:0 0 12px rgba(201,168,76,0.4)}50%{box-shadow:0 0 20px rgba(201,168,76,0.7)}}

/* EMPTY */
.empty{text-align:center;padding:70px 20px;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:16px;opacity:.4;}
.empty-text{font-size:.65rem;letter-spacing:4px;text-transform:uppercase;font-weight:300;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(4,4,12,0.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;animation:fadeOverlay .2s ease;}
[data-theme="light"] .overlay{background:rgba(230,227,218,0.88);}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
.modal{
  background:#0f0f1e;border:1px solid var(--border);padding:32px;
  width:100%;max-width:480px;max-height:92vh;overflow-y:auto;
  border-radius:var(--radius);position:relative;
  box-shadow:0 40px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(201,168,76,0.08);
  animation:modalIn .25s cubic-bezier(.34,1.56,.64,1);
}
[data-theme="light"] .modal{background:#f0ede6;box-shadow:0 40px 80px rgba(0,0,0,0.12),0 0 0 1px rgba(158,115,32,0.1);}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
.modal::before{content:'';position:absolute;top:0;left:32px;right:32px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;}
.modal-title{font-family:var(--font-display);font-size:1.9rem;font-weight:300;letter-spacing:3px;margin-bottom:24px;color:var(--platinum);}
.form-group{margin-bottom:18px;}

/* SET ROW */
.set-row{display:grid;grid-template-columns:36px 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px;}
.set-num{font-size:.62rem;color:var(--muted);text-align:center;font-weight:300;}

/* GOLD LINE */
.gold-line{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.3),transparent);margin:28px 0;}

/* ARROW RIGHT */
.arrow-right{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:1px solid var(--border);color:var(--muted);font-size:.7rem;transition:var(--transition);border-radius:50%;}
.card-click:hover .arrow-right{border-color:var(--gold);color:var(--gold);box-shadow:0 0 12px rgba(201,168,76,0.2);}

/* SECTION TITLE */
.section-title{font-size:.6rem;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;font-weight:400;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* PROFILE SECTION */
.profile-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px 28px;margin-bottom:16px;position:relative;overflow:hidden;transition:var(--transition);}
.profile-section::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--gold),transparent);}
.profile-section:hover{border-color:var(--border-hover);}

/* FRIENDS */
.friend-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;transition:var(--transition);}
.friend-card:hover{border-color:var(--border-hover);}
.friend-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;flex-wrap:wrap;gap:12px;}

.friend-sub{font-size:.6rem;color:var(--muted);letter-spacing:2px;margin-top:2px;}
.friend-body{padding:4px 24px 20px;}

.pr-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}

.pr-info{flex:1;}

.pr-detail{font-size:.6rem;color:var(--muted);margin-top:2px;}
.pr-weight{font-family:var(--font-display);font-size:1.5rem;color:var(--gold2);font-weight:400;flex-shrink:0;}

  cursor:pointer;transition:var(--transition);
}
.share-code-box:hover{border-color:var(--gold);color:var(--text);}
.share-code-box::after{content:'';position:absolute;bottom:0;left:0;right:0;height:28px;background:linear-gradient(transparent,var(--bg));}
[data-theme="light"] .share-code-box::after{background:linear-gradient(transparent,var(--surface));}

/* COPY SUCCESS / ERROR */
.msg-ok{color:var(--green);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;font-weight:500;}
.msg-err{color:var(--red);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;font-weight:400;}

input[type=range]{width:100%;margin-top:10px;-webkit-appearance:none;appearance:none;height:2px;background:var(--border);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 0 10px rgba(201,168,76,0.4);transition:box-shadow .2s;}
input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 20px rgba(201,168,76,0.6);}
input[type=date]{color-scheme:dark;}
[data-theme="light"] input[type=date]{color-scheme:light;}

/* LOADER */
.loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;animation:loaderFade .4s .5s ease forwards;}
@keyframes loaderFade{to{opacity:0;pointer-events:none}}
.loader-logo{font-family:var(--font-display);font-size:3rem;font-weight:300;letter-spacing:12px;color:var(--gold);animation:logoPulse .5s ease;}
@keyframes logoPulse{from{opacity:0;letter-spacing:20px}to{opacity:1;letter-spacing:12px}}

/* ANIMATIONS */
.fade-in{animation:fadeIn .4s cubic-bezier(.4,0,.2,1) both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
.stagger>*{animation:fadeIn .4s cubic-bezier(.4,0,.2,1) both;}
.stagger>*:nth-child(1){animation-delay:.05s}.stagger>*:nth-child(2){animation-delay:.1s}
.stagger>*:nth-child(3){animation-delay:.15s}.stagger>*:nth-child(4){animation-delay:.2s}
.stagger>*:nth-child(5){animation-delay:.25s}.stagger>*:nth-child(6){animation-delay:.3s}
.stagger>*:nth-child(7){animation-delay:.35s}

/* SCROLLBAR */

::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.2);border-radius:2px;}

══════════════════════════════════════════════════════ */
.bottom-nav{

const { useState, useEffect, useRef, useCallback } = React;

/* ── STORAGE ─────────────────────────────────────────────────────────────── */
const ACCOUNTS_KEY = "replog_accounts_v1";
const SESSION_KEY  = "replog_session_v1";

const loadSession   = () => { try { const r = localStorage.getItem(SESSION_KEY); return r ? JSON.parse(r) : null; } catch { return null; } };
const saveSession   = (s) => { try { if (s) localStorage.setItem(SESSION_KEY, JSON.stringify(s)); else localStorage.removeItem(SESSION_KEY); } catch {} };

/* ── SHARE CODE ──────────────────────────────────────────────────────────── */
const encodeShare = (userId, username, programs) => {
  try {
    const payload = { type:"replog_share", v:1, userId, username, programs, exportedAt:today() };
    return btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  } catch { return ""; }
};
const decodeShare = (code) => {
  try {
    const str = decodeURIComponent(escape(atob(code.trim())));
    const obj = JSON.parse(str);
    if (obj.type === "replog_share" && obj.userId && obj.username) return obj;
    return null;
  } catch { return null; }
};

/* ── COUNTER ─────────────────────────────────────────────────────────────── */
function Counter({ value }) {
  const [display, setDisplay] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    let start = 0, end = parseFloat(value) || 0;
    if (ref.current) clearInterval(ref.current);
    const step = end / (800 / 16);
    ref.current = setInterval(() => {
      start += step;
      if (start >= end) { setDisplay(end); clearInterval(ref.current); }
      else setDisplay(Math.floor(start));
    }, 16);
    return () => clearInterval(ref.current);
  }, [value]);
  return <>{display}</>;
}

/* ══════════════════════════════════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════════════════════════════════ */
function LoginScreen({ onLogin, lang, setLang, theme, setTheme }) {
  const [accounts, setAccounts] = useState(loadAccounts);
  const [step, setStep] = useState("list"); // list | pin | create1 | create2
  const [selectedAccount, setSelectedAccount] = useState(null);
  const [pin, setPin] = useState("");
  const [pinError, setPinError] = useState(false);
  const [newUsername, setNewUsername] = useState("");
  const [newPin, setNewPin] = useState("");
  const [newPinConfirm, setNewPinConfirm] = useState("");
  const [createStep, setCreateStep] = useState(1);
  const [createError, setCreateError] = useState("");

  const t = (k) => T[lang][k] ?? k;

  const handleSelectAccount = (acc) => {
    setSelectedAccount(acc);
    setPin("");
    setPinError(false);
    setStep("pin");
  };

  const handlePinDigit = (d) => {
    if (pin.length >= 4) return;
    const next = pin + d;
    setPin(next);
    setPinError(false);
    if (next.length === 4) {
      setTimeout(() => {
        if (next === selectedAccount.pin) {
          saveSession({ username: selectedAccount.username });
          onLogin(selectedAccount.username);
        } else {
          setPinError(true);
          setTimeout(() => { setPin(""); setPinError(false); }, 600);
        }
      }, 150);
    }
  };

  const handleBackspace = () => setPin(p => p.slice(0, -1));

  const handleCreateAccount = () => {
    if (createStep === 1) {
      if (!newUsername.trim()) { setCreateError("username"); return; }
      if (accounts.some(a => a.username.toLowerCase() === newUsername.trim().toLowerCase())) {
        setCreateError("taken"); return;
      }
      setCreateError(""); setCreateStep(2);
    } else {
      if (newPin.length !== 4) { setCreateError("short"); return; }
      if (newPin !== newPinConfirm) { setCreateError("mismatch"); return; }
      const acc = { username: newUsername.trim(), pin: newPin, createdAt: today() };
      const updated = [...accounts, acc];
      saveAccounts(updated);
      setAccounts(updated);
      // Init data
      const d = defaultData(acc.username);
      saveUserData(acc.username, d);
      saveSession({ username: acc.username });
      onLogin(acc.username);
    }
  };

  const PinKeypad = ({ value, onChange, maxLen = 4 }) => (
    <div className="pin-keypad">
      {[1,2,3,4,5,6,7,8,9].map(n => (
        <button key={n} className="pin-key" onClick={() => onChange(String(n))} disabled={value.length >= maxLen}>{n}</button>
      ))}
      <button className="pin-key zero" onClick={() => onChange("0")} disabled={value.length >= maxLen}>0</button>
      <button className="pin-key del" onClick={() => onChange("DEL")}>⌫</button>
    </div>
  );

  const handlePinKeypad = (d) => {
    if (d === "DEL") { setPin(p => p.slice(0, -1)); return; }
    handlePinDigit(d);
  };

  const handleNewPinKeypad = (d, target, setTarget) => {
    if (d === "DEL") { setTarget(p => p.slice(0, -1)); return; }
    if (target.length < 4) setTarget(p => p + d);
  };

  return (
    <div className="login-screen">
      {/* Theme / Lang controls top right */}
      <div style={{position:"absolute",top:20,right:20,display:"flex",gap:6,alignItems:"center"}}>
        <button className={`ctrl-btn ${lang==="fr"?"is-active":""}`} onClick={() => setLang("fr")}>FR</button>
        <button className={`ctrl-btn ${lang==="en"?"is-active":""}`} onClick={() => setLang("en")}>EN</button>
        <div className="ctrl-sep" />
        <button className="ctrl-btn" onClick={() => setTheme(t => t === "dark" ? "light" : "dark")}>
          {theme === "dark" ? "☀" : "🌙"}
        </button>
      </div>

      <div className="login-logo">Track<span>Fit</span></div>
      <div className="login-sub">{t("appSub")}</div>

      {/* ACCOUNT LIST */}
      {step === "list" && (
        <div className="login-box fade-in">
          {accounts.length > 0 && (
            <>
              <div style={{fontSize:".58rem",letterSpacing:"4px",textTransform:"uppercase",color:"var(--muted)",marginBottom:14,textAlign:"center"}}>{t("loginSub")}</div>
              <div className="accounts-grid stagger">
                {accounts.map(acc => (
                  <div key={acc.username} className="account-card" onClick={() => handleSelectAccount(acc)}>
                    <div className="account-avatar">{acc.username[0].toUpperCase()}</div>
                    <div>
                      <div className="account-name">{acc.username}</div>
                      <div className="account-sub">{t("since")} {fmt(acc.createdAt, lang === "fr" ? "fr-FR" : "en-US")}</div>
                    </div>
                    <div className="account-arrow">›</div>
                  </div>
                ))}
              </div>
              <div className="gold-line" />
            </>
          )}
          <button className="btn btn-primary" style={{width:"100%",justifyContent:"center"}} onClick={() => { setStep("create"); setCreateStep(1); setNewUsername(""); setNewPin(""); setNewPinConfirm(""); setCreateError(""); }}>
            {accounts.length === 0 ? "✦ " : ""}{t("createAccount")}
          </button>
        </div>
      )}

      {/* PIN ENTRY */}
      {step === "pin" && selectedAccount && (
        <div className="login-box fade-in pin-screen">
          <div className="account-avatar" style={{margin:"0 auto 16px",width:56,height:56,fontSize:"2rem"}}>{selectedAccount.username[0].toUpperCase()}</div>
          <div className="pin-title">{selectedAccount.username}</div>
          <div className="pin-sub">{t("enterPin")}</div>
          <div className="pin-dots">
            {[0,1,2,3].map(i => (
              <div key={i} className={`pin-dot ${pin.length > i ? "filled" : ""} ${pinError ? "error" : ""}`} />
            ))}
          </div>
          <div className="pin-keypad" style={{maxWidth:280,margin:"0 auto"}}>
            {[1,2,3,4,5,6,7,8,9].map(n => (
              <button key={n} className="pin-key" onClick={() => handlePinDigit(String(n))}>{n}</button>
            ))}
            <button className="pin-key" style={{background:"transparent",border:"none",cursor:"pointer",fontSize:".6rem",color:"var(--muted)",letterSpacing:"1px"}} onClick={() => setStep("list")}>{t("backToAccounts")}</button>
            <button className="pin-key zero" onClick={() => handlePinDigit("0")}>0</button>
            <button className="pin-key del" onClick={handleBackspace}>⌫</button>
          </div>
          {pinError && <div className="msg-err" style={{marginTop:16}}>✕ {t("wrongPin")}</div>}
        </div>
      )}

      {/* CREATE ACCOUNT */}
      {step === "create" && (
        <div className="create-account fade-in">
          <div className="login-step-indicator">
            <div className={`login-step ${createStep >= 1 ? "active" : ""}`} />
            <div className={`login-step ${createStep >= 2 ? "active" : ""}`} />
          </div>
          <div className="create-title">{t("newAccountTitle")}</div>

          {createStep === 1 && (
            <>
              <div className="form-group">
                <label>{t("chooseUsername")}</label>
                <input className="input" placeholder={t("chooseUsernamePh")} value={newUsername}
                  onChange={e => { setNewUsername(e.target.value); setCreateError(""); }}
                  onKeyDown={e => e.key === "Enter" && handleCreateAccount()}
                  autoFocus />
                {createError === "taken" && <div className="msg-err" style={{marginTop:8}}>✕ Ce pseudo est déjà pris.</div>}
              </div>
              <div style={{display:"flex",gap:10,marginTop:20}}>
                <button className="btn btn-primary" onClick={handleCreateAccount} disabled={!newUsername.trim()}>{t("next") ?? "Continuer →"}</button>
                {accounts.length > 0 && <button className="btn btn-ghost" onClick={() => setStep("list")}>{t("cancel")}</button>}
              </div>
            </>
          )}

          {createStep === 2 && (
            <>
              <div className="form-group">
                <label>{t("choosePin")}</label>
                <div className="pin-dots" style={{justifyContent:"flex-start",marginBottom:16}}>
                  {[0,1,2,3].map(i => <div key={i} className={`pin-dot ${newPin.length > i ? "filled" : ""}`} />)}
                </div>
                <div className="pin-keypad" style={{maxWidth:240,margin:"0 0 20px"}}>
                  {[1,2,3,4,5,6,7,8,9].map(n => (
                    <button key={n} className="pin-key" onClick={() => newPin.length < 4 && setNewPin(p => p + n)} style={{height:50,fontSize:"1.4rem"}}>{n}</button>
                  ))}
                  <div/>
                  <button className="pin-key zero" onClick={() => newPin.length < 4 && setNewPin(p => p + "0")} style={{height:50,fontSize:"1.4rem"}}>0</button>
                  <button className="pin-key del" onClick={() => setNewPin(p => p.slice(0,-1))} style={{height:50}}>⌫</button>
                </div>
              </div>
              {newPin.length === 4 && (
                <div className="form-group fade-in">
                  <label>{t("confirmPin")}</label>
                  <div className="pin-dots" style={{justifyContent:"flex-start",marginBottom:16}}>
                    {[0,1,2,3].map(i => <div key={i} className={`pin-dot ${newPinConfirm.length > i ? "filled" : ""}`} />)}
                  </div>
                  <div className="pin-keypad" style={{maxWidth:240,margin:"0 0 20px"}}>
                    {[1,2,3,4,5,6,7,8,9].map(n => (
                      <button key={n} className="pin-key" onClick={() => newPinConfirm.length < 4 && setNewPinConfirm(p => p + n)} style={{height:50,fontSize:"1.4rem"}}>{n}</button>
                    ))}
                    <div/>
                    <button className="pin-key zero" onClick={() => newPinConfirm.length < 4 && setNewPinConfirm(p => p + "0")} style={{height:50,fontSize:"1.4rem"}}>0</button>
                    <button className="pin-key del" onClick={() => setNewPinConfirm(p => p.slice(0,-1))} style={{height:50}}>⌫</button>
                  </div>
                </div>
              )}
              {createError === "mismatch" && <div className="msg-err" style={{marginBottom:12}}>✕ {t("pinMismatch")}</div>}
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <button className="btn btn-primary" onClick={handleCreateAccount} disabled={newPin.length !== 4 || newPinConfirm.length !== 4}>{t("createBtn")}</button>
                <button className="btn btn-ghost" onClick={() => { setCreateStep(1); setNewPin(""); setNewPinConfirm(""); setCreateError(""); }}>{t("cancel")}</button>
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════════════════════════ */
function App() {
  const [theme, setTheme] = useState(() => localStorage.getItem("replog_theme") || "dark");
  const [lang,  setLang]  = useState(() => localStorage.getItem("replog_lang")  || "fr");
  const [loading, setLoading] = useState(true);

  // Auth
  const [loggedInUser, setLoggedInUser] = useState(() => {
    const s = loadSession();
    return s ? s.username : null;
  });

  // App data
  const [data, setData] = useState(null);
  const [view,  setView]  = useState({ page:"home" });
  const [modal, setModal] = useState(null);

  // Friends state
  const [shareCode,   setShareCode]   = useState("");
  const [copyState,   setCopyState]   = useState("");
  const [friendInput, setFriendInput] = useState("");
  const [friendMsg,   setFriendMsg]   = useState({ text:"", ok:true });
  const [usernameVal, setUsernameVal] = useState("");

  // Backup state
  const [backupMsg, setBackupMsg] = useState({ text:"", ok:true });
  const importInputRef = useRef(null);

  useEffect(() => { setTimeout(() => setLoading(false), 700); }, []);
  useEffect(() => { document.documentElement.setAttribute("data-theme", theme); localStorage.setItem("replog_theme", theme); }, [theme]);
  useEffect(() => { document.documentElement.lang = lang; localStorage.setItem("replog_lang", lang); }, [lang]);

  useEffect(() => {
    if (loggedInUser) {
      let d = loadUserData(loggedInUser);
      if (!d) { d = defaultData(loggedInUser); saveUserData(loggedInUser, d); }
      setData(d);
    }
  }, [loggedInUser]);

  useEffect(() => {
    if (loggedInUser && data) saveUserData(loggedInUser, data);
  }, [data, loggedInUser]);

  const t = (key, ...args) => { const v = T[lang][key]; return typeof v === "function" ? v(...args) : (v ?? key); };
  const locale = lang === "fr" ? "fr-FR" : "en-US";
  const fmtD = (d) => fmt(d, locale);
  const upd = (fn) => setData(p => { const n = JSON.parse(JSON.stringify(p)); fn(n); return n; });

  const handleLogin = (username) => setLoggedInUser(username);
  const handleLogout = () => {
    saveSession(null);
    setLoggedInUser(null);
    setData(null);
    setView({ page:"home" });
    setModal(null);
  };

  if (loading) return <div className="loader"><div className="loader-logo">TrackFit</div></div>;
  if (!loggedInUser || !data) return <LoginScreen onLogin={handleLogin} lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />;

  const prog = view.programId ? data.programs.find(p => p.id === view.programId) : null;
  const day  = prog && view.dayId ? prog.days.find(d => d.id === view.dayId) : null;
  const exo  = day && view.exoId ? day.exercises.find(e => e.id === view.exoId) : null;
  const nav  = (page, extra = {}) => { setView({ page, ...extra }); window.scrollTo(0,0); };
  const closeModal = () => setModal(null);

  /* Program ops */
  const createProgram = () => {
    if (!modal.name.trim()) return;
    const days = Array.from({ length: modal.days }, (_, i) => ({ id:uid(), index:i, name:`Session ${i+1}`, exercises:[] }));
    upd(d => d.programs.push({ id:uid(), name:modal.name.trim(), daysPerWeek:modal.days, days, createdAt:today() }));
    closeModal();
  };
  const deleteProgram = (pid) => { upd(d => { d.programs = d.programs.filter(p => p.id !== pid); }); nav("home"); };
  const updateDayName = (dayId, name) => upd(d => { d.programs.find(p => p.id === view.programId).days.find(dd => dd.id === dayId).name = name; });

  const addExercise = () => {
    if (!modal.name.trim()) return;
    upd(d => { d.programs.find(p => p.id === view.programId).days.find(dd => dd.id === view.dayId).exercises.push({ id:uid(), name:modal.name.trim(), sessions:[] }); });
    closeModal();
  };
  const deleteExercise = () => {
    upd(d => { const p = d.programs.find(p => p.id === view.programId); const dv = p.days.find(dd => dd.id === view.dayId); dv.exercises = dv.exercises.filter(e => e.id !== view.exoId); });
    nav("day", { programId:view.programId, dayId:view.dayId });
  };

  const logSession = () => {
    const validSets = modal.sets.filter(s => s.reps !== "" && s.weight !== "").map(s => ({ reps:Number(s.reps), weight:Number(s.weight) }));
    if (!validSets.length) return;
    upd(d => { d.programs.find(p => p.id === view.programId).days.find(dd => dd.id === view.dayId).exercises.find(e => e.id === view.exoId).sessions.push({ id:uid(), date:modal.date, sets:validSets }); });
    closeModal();
  };
  const deleteSession = (sid) => upd(d => {
    const e = d.programs.find(p => p.id === view.programId).days.find(dd => dd.id === view.dayId).exercises.find(e => e.id === view.exoId);
    e.sessions = e.sessions.filter(s => s.id !== sid);
  });

  const addSet    = () => setModal(m => ({ ...m, sets:[...m.sets, { reps:"", weight:"" }] }));
  const removeSet = (i) => setModal(m => ({ ...m, sets:m.sets.filter((_,idx) => idx!==i) }));
  const updateSet = (i, f, v) => setModal(m => { const sets=[...m.sets]; sets[i]={...sets[i],[f]:v}; return {...m,sets}; });

  const isPR = (session, all) => {
    const mx = Math.max(...session.sets.map(s => s.weight));
    const prev = all.filter(s => s.id !== session.id);
    if (!prev.length) return true;
    return mx > Math.max(...prev.flatMap(s => s.sets.map(st => st.weight)));
  };
  const openLog = () => {
    const last = exo?.sessions?.[exo.sessions.length - 1];
    const sets = last ? last.sets.map(s => ({ reps:s.reps, weight:s.weight })) : [{ reps:"", weight:"" }];
    setModal({ type:"log", date:today(), sets });
  };

  /* Friends ops */
  const generateShareCode = () => {
    if (!data.username.trim()) { setShareCode(""); return; }
    setShareCode(encodeShare(data.userId, data.username, data.programs));
  };
  const copyShareCode = async () => {
    if (!shareCode) return;
    try { await navigator.clipboard.writeText(shareCode); } catch {}
    setCopyState("ok"); setTimeout(() => setCopyState(""), 2000);
  };
  const saveUsername = () => {
    const name = (usernameVal || "").trim();
    if (!name) return;
    upd(d => { d.username = name; });
    setUsernameVal(""); setShareCode("");
  };
  const addFriend = () => {
    setFriendMsg({ text:"", ok:true });
    const decoded = decodeShare(friendInput);
    if (!decoded) { setFriendMsg({ text:t("invalidCode"), ok:false }); return; }
    if (decoded.userId === data.userId) { setFriendMsg({ text:t("cantAddSelf"), ok:false }); return; }
    if (data.friends.some(f => f.id === decoded.userId)) { setFriendMsg({ text:t("alreadyFriend"), ok:false }); return; }
    upd(d => d.friends.push({ id:decoded.userId, username:decoded.username, programs:decoded.programs, addedAt:today() }));
    setFriendInput(""); setFriendMsg({ text:t("friendAdded"), ok:true });
    setTimeout(() => setFriendMsg({ text:"", ok:true }), 3000);
  };
  const removeFriend = (fid) => upd(d => { d.friends = d.friends.filter(f => f.id !== fid); });

  const getFriendPRs = (friend) => {
    const prs = [];
    (friend.programs||[]).forEach(prog => (prog.days||[]).forEach(day => (day.exercises||[]).forEach(e => {
      const sessions = e.sessions || [];
      [...sessions].reverse().forEach(session => {
        if (!session.sets?.length) return;
        const mx = Math.max(...session.sets.map(s => s.weight));
        const prev = sessions.filter(s => s.id !== session.id);
        const prFlag = !prev.length || mx > Math.max(...prev.flatMap(s => s.sets.map(st => st.weight)));
        if (prFlag && mx > 0) prs.push({ exo:e.name, weight:mx, date:session.date, prog:prog.name });
      });
    })));
    return prs.sort((a,b) => b.date.localeCompare(a.date)).slice(0,5);
  };

  /* Backup ops */
  const exportData = () => {
    const payload = { type:"replog_backup", v:1, username:loggedInUser, data, exportedAt:new Date().toISOString() };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `trackfit_${loggedInUser}_${today()}.json`;
    a.click(); URL.revokeObjectURL(url);
  };
  const importData = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const obj = JSON.parse(ev.target.result);
        if (obj.type !== "replog_backup" || !obj.data) { setBackupMsg({ text:t("importError"), ok:false }); return; }
        setData(obj.data);
        setBackupMsg({ text:t("importSuccess"), ok:true });
        setTimeout(() => setBackupMsg({ text:"", ok:true }), 3000);
      } catch { setBackupMsg({ text:t("importError"), ok:false }); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };
  const deleteAccount = () => {
    if (!window.confirm(t("deleteAccountQ"))) return;
    localStorage.removeItem(dataKey(loggedInUser));
    const accs = loadAccounts().filter(a => a.username !== loggedInUser);
    saveAccounts(accs);
    handleLogout();
  };

  /* Bottom nav tab detection */
  const activeTab = view.page === "friends" ? "friends" : view.page === "settings" ? "settings" : "home";

  /* ── RENDER ── */
  return (
    <>
      <div className="app">

        {/* HEADER */}
        <header className="header">
          <div className="header-left">
            <div className="logo" onClick={() => nav("home")}>Track<span>Fit</span></div>
            <div className="logo-sub">{t("appSub")}</div>
          </div>

          <div className="header-center">
            {view.page !== "home" && view.page !== "friends" && view.page !== "settings" && (
              <div className="breadcrumb">
                <span className="bc-link" onClick={() => nav("home")}>Programs</span>
                {prog && <><span className="bc-sep">›</span><span className="bc-link" onClick={() => nav("program",{programId:prog.id})}>{prog.name}</span></>}
                {day  && <><span className="bc-sep">›</span><span className="bc-link" onClick={() => nav("day",{programId:prog.id,dayId:day.id})}>{day.name}</span></>}
                {exo  && <><span className="bc-sep">›</span><span style={{color:"var(--muted)"}}>{exo.name}</span></>}
              </div>
            )}
          </div>

          <div className="header-right">
            {/* Friends (desktop) */}
            <button className={`ctrl-btn ${view.page==="friends"?"is-active":""}`} onClick={() => nav(view.page==="friends"?"home":"friends")} title={t("friendsBtn")} style={{position:"relative"}}>
              👥 <span className="ctrl-btn-txt" style={{fontSize:".62rem",letterSpacing:"2px"}}>{t("friendsBtn")}</span>
              {data.friends.length > 0 && <span className="friends-dot" />}
            </button>

            <div className="ctrl-sep" />

            {/* Language */}
            <button className={`ctrl-btn ${lang==="fr"?"is-active":""}`} onClick={() => setLang("fr")}>FR</button>
            <button className={`ctrl-btn ${lang==="en"?"is-active":""}`} onClick={() => setLang("en")}>EN</button>

            <div className="ctrl-sep" />

            {/* Theme */}
            <button className="ctrl-btn" onClick={() => setTheme(t => t==="dark"?"light":"dark")}>
              {theme==="dark" ? "☀" : "🌙"}
            </button>

            <div className="ctrl-sep" />

            {/* Logout */}
            <button className="ctrl-btn" onClick={handleLogout} title={t("logout")} style={{fontSize:".7rem",letterSpacing:"1px"}}>
              ↩ <span className="ctrl-btn-txt">{loggedInUser}</span>
            </button>
          </div>
        </header>

        {/* ── HOME ── */}
        {view.page === "home" && (
          <div className="fade-in">
            <div className="accent-bar" />
            <div className="page-title">{t("myPrograms")}</div>
            <div className="page-sub">{t("manageTrain")}</div>
            {data.programs.length === 0 ? (
              <div className="empty"><div className="empty-icon">🏆</div><div className="empty-text">{t("noProg")}</div></div>
            ) : (
              <div className="stagger">
                {data.programs.map(p => (
                  <div key={p.id} className="card card-click" onClick={() => nav("program",{programId:p.id})}>
                    <div className="card-header">
                      <div style={{flex:1,minWidth:0}}>
                        <div className="card-title">{p.name}</div>
                        <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:"0 0"}}>
                          <span className="tag tag-gold">{p.daysPerWeek} {t("daysWk")}</span>
                          <span className="tag">{p.days.reduce((a,d)=>a+d.exercises.length,0)} {t("exoCount")}</span>
                          <span className="tag">{t("since")} {fmtD(p.createdAt)}</span>
                        </div>
                      </div>
                      <div className="arrow-right">›</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
            <div style={{marginTop:28}}>
              <button className="btn btn-primary" onClick={() => setModal({type:"createProgram",name:"",days:4})}>{t("newProg")}</button>
            </div>
          </div>
        )}

        {/* ── PROGRAM ── */}
        {view.page === "program" && prog && (
          <div className="fade-in">
            <div className="accent-bar" />
            <div className="page-title">{prog.name}</div>
            <div className="page-sub">{prog.daysPerWeek} {t("trainingDays")}</div>
            <div className="stats-row stagger">
              <div className="stat-box"><div className="stat-value"><Counter value={prog.daysPerWeek} /></div><div className="stat-label">{t("daysWk")}</div></div>
              <div className="stat-box"><div className="stat-value"><Counter value={prog.days.reduce((a,d)=>a+d.exercises.length,0)} /></div><div className="stat-label">{t("exoCount")}</div></div>
              <div className="stat-box"><div className="stat-value"><Counter value={prog.days.reduce((a,d)=>a+d.exercises.reduce((b,e)=>b+e.sessions.length,0),0)} /></div><div className="stat-label">{t("sessLogged")}</div></div>
            </div>
            <div style={{fontSize:".6rem",letterSpacing:"3px",textTransform:"uppercase",color:"var(--muted)",marginBottom:14,fontWeight:300}}>{t("selectSess")}</div>
            <div className="days-grid stagger">
              {prog.days.map(d => (
                <div key={d.id} className="day-card" onClick={() => nav("day",{programId:prog.id,dayId:d.id})}>
                  <div className="day-card-name">{d.name}</div>
                  <div className="day-card-count">{t("exo",d.exercises.length)}</div>
                  <div className="day-num-bg">{d.index+1}</div>
                </div>
              ))}
            </div>
            <div className="gold-line" />
            <button className="btn btn-danger btn-sm" onClick={() => { if (window.confirm(t("delProgQ"))) deleteProgram(prog.id); }}>{t("deleteProg")}</button>
          </div>
        )}

        {/* ── DAY ── */}
        {view.page === "day" && day && (
          <div className="fade-in">
            <div className="accent-bar" />
            <div className="page-title">{day.name}</div>
            <div className="page-sub">{prog.name} · {t("exo",day.exercises.length)}</div>
            <EditableName value={day.name} onChange={name => updateDayName(day.id, name)} t={t} />
            {day.exercises.length === 0 ? (
              <div className="empty"><div className="empty-icon">📋</div><div className="empty-text">{t("addFirstExo")}</div></div>
            ) : (
              <div className="card stagger" style={{padding:"0 28px"}}>
                {day.exercises.map(e => {
                  const last = e.sessions[e.sessions.length-1];
                  const total = e.sessions.reduce((a,s)=>a+s.sets.length,0);
                  return (
                    <div key={e.id} className="exo-row" onClick={() => nav("exercise",{programId:prog.id,dayId:day.id,exoId:e.id})}>
                      <div style={{flex:1,minWidth:0}}>
                        <div className="exo-name">{e.name}</div>
                        <div className="exo-info">{t("ses",e.sessions.length)} · {t("st",total)}{last?` · ${t("since")} ${fmtD(last.date)}`:""}</div>
                      </div>
                      <span className="exo-arrow">›</span>
                    </div>
                  );
                })}
              </div>
            )}
            <div style={{marginTop:24}}>
              <button className="btn btn-primary" onClick={() => setModal({type:"createExo",name:""})}>{t("addExo")}</button>
            </div>
          </div>
        )}

        {/* ── EXERCISE ── */}
        {view.page === "exercise" && exo && (() => {
          const allW = exo.sessions.flatMap(s => s.sets.map(st => st.weight));
          const maxW = allW.length ? Math.max(...allW) : 0;
          const totalSets = exo.sessions.reduce((a,s)=>a+s.sets.length,0);
          const lastS = exo.sessions[exo.sessions.length-1];
          const lastMax = lastS ? Math.max(...lastS.sets.map(s=>s.weight)) : 0;
          return (
            <div className="fade-in">
              <div className="accent-bar" />
              <div className="page-title">{exo.name}</div>
              <div className="page-sub">{day.name} · {t("ses",exo.sessions.length)}</div>
              {exo.sessions.length > 0 && (
                <div className="stats-row stagger">
                  <div className="stat-box"><div className="stat-value"><Counter value={maxW} /><span className="stat-unit"> kg</span></div><div className="stat-label">{t("personalRec")}</div></div>
                  <div className="stat-box"><div className="stat-value"><Counter value={totalSets} /></div><div className="stat-label">{t("totalSets")}</div></div>
                  <div className="stat-box"><div className="stat-value"><Counter value={lastMax} /><span className="stat-unit"> kg</span></div><div className="stat-label">{t("lastSess")}</div></div>
                  <div className="stat-box"><div className="stat-value"><Counter value={exo.sessions.length} /></div><div className="stat-label">{t("sessions")}</div></div>
                </div>
              )}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,gap:12}}>
                <div style={{fontSize:".6rem",letterSpacing:"3px",textTransform:"uppercase",color:"var(--muted)",fontWeight:300}}>{t("sessHist")}</div>
                <button className="btn btn-primary btn-sm" onClick={openLog}>{t("logSess")}</button>
              </div>
              {exo.sessions.length === 0 ? (
                <div className="empty"><div className="empty-icon">📊</div><div className="empty-text">{t("noSessYet")}</div></div>
              ) : (
                <div className="stagger">
                  {[...exo.sessions].reverse().map(session => {
                    const pr  = isPR(session, exo.sessions);
                    const mW  = Math.max(...session.sets.map(s=>s.weight));
                    const tR  = session.sets.reduce((a,s)=>a+s.reps,0);
                    const vol = session.sets.reduce((a,s)=>a+s.reps*s.weight,0);
                    return (
                      <div key={session.id} className="history-session">
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                          <div className="history-date">
                            {fmtD(session.date)}
                            {pr && <span className="pr-badge">⚡ {t("pr")}</span>}
                          </div>
                          <button className="btn-icon btn-icon-sm" onClick={() => { if (window.confirm(t("delSessQ"))) deleteSession(session.id); }}>✕</button>
                        </div>
                        <div style={{overflowX:"auto"}}>
                          <table className="log-table">
                            <thead><tr><th>Set</th><th>{t("reps")}</th><th>{t("weightLbl")}</th><th>{t("volume")}</th></tr></thead>
                            <tbody>
                              {session.sets.map((set,i) => (
                                <tr key={i}>
                                  <td style={{color:"var(--muted)",fontSize:".7rem"}}>{i+1}</td>
                                  <td className="num">{set.reps}</td>
                                  <td className="num">{set.weight} kg</td>
                                  <td style={{color:"var(--muted)",fontSize:".7rem"}}>{(set.reps*set.weight).toLocaleString(locale)} kg</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                        <div style={{fontSize:".6rem",color:"var(--muted2)",display:"flex",gap:16,flexWrap:"wrap",fontWeight:300,marginTop:4}}>
                          <span>{t("st",session.sets.length)} · {tR} reps · {mW} kg max</span>
                          <span style={{color:"var(--gold)",opacity:.7}}>{t("volume")}: {vol.toLocaleString(locale)} kg</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              <div className="gold-line" />
              <button className="btn btn-danger btn-sm" onClick={() => { if (window.confirm(t("delExoQ"))) deleteExercise(); }}>{t("deleteExo")}</button>
            </div>
          );
        })()}

        {/* ── FRIENDS ── */}
        {view.page === "friends" && (
          <div className="fade-in">
            <div className="accent-bar" />
            <div className="page-title">{t("friendsTitle")}</div>
            <div className="page-sub">{t("friendsSub")}</div>

            <div className="profile-section">
              <div className="section-title">👤 {t("myProfile")}</div>
              <div className="form-group">
                <label>{t("myUsername")}</label>
                <div style={{display:"flex",gap:10}}>
                  <input className="input" placeholder={data.username || t("usernamePh")}
                    value={usernameVal} onChange={e => setUsernameVal(e.target.value)}
                    onKeyDown={e => e.key==="Enter" && saveUsername()} />
                  <button className="btn btn-primary btn-sm" onClick={saveUsername} disabled={!usernameVal.trim()}>{t("save")}</button>

              </div>
              <div className="form-group" style={{marginBottom:0}}>
                <label>{t("shareCodeLbl")}</label>

            <div className="profile-section">

            <div className="section-title" style={{marginTop:32}}>👥 {t("friendsBtn")} <span style={{color:"var(--muted)",fontSize:".55rem"}}>{data.friends.length}</span></div>

                  const prs = getFriendPRs(friend);
                  const totalExos = (friend.programs||[]).reduce((a,p)=>a+p.days.reduce((b,d)=>b+d.exercises.length,0),0);
                  const totalSess = (friend.programs||[]).reduce((a,p)=>a+p.days.reduce((b,d)=>b+d.exercises.reduce((c,e)=>c+e.sessions.length,0),0),0);
                  return (
                    <div key={friend.id} className="friend-card">

                      <div className="friend-body">
                        {prs.length > 0 && (
                          <>
                            <div className="friend-section-label">⚡ {t("recentPRs")}</div>
                            {prs.map((pr,i) => (
                              <div key={i} className="pr-item">
                                <div style={{fontSize:"1.1rem"}}>🏅</div>
                                <div className="pr-info"><div className="pr-exo">{pr.exo}</div><div className="pr-detail">{pr.prog} · {fmtD(pr.date)}</div></div>

                              </div>

                          <>
                            <div className="friend-section-label">📋 {t("friendProgs")}</div>
                            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                              {(friend.programs||[]).map(p => <span key={p.id} className="tag tag-gold">{p.name}</span>)}

                          </>
                        )}
                        {prs.length === 0 && (friend.programs||[]).length === 0 && <div style={{fontSize:".62rem",color:"var(--muted2)",padding:"12px 0",letterSpacing:"1px"}}>{t("noProgs")}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ── SETTINGS ── */}
        {view.page === "settings" && (
          <div className="fade-in">
            <div className="accent-bar" />
            <div className="page-title">{t("settings")}</div>
            <div className="page-sub">{loggedInUser}</div>

            {/* Theme & Language */}
            <div className="profile-section">
              <div className="section-title">🎨 Apparence</div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:16}}>
                <button className={`btn btn-sm ${theme==="dark"?"btn-primary":"btn-ghost"}`} onClick={() => setTheme("dark")}>🌙 {t("dark")}</button>
                <button className={`btn btn-sm ${theme==="light"?"btn-primary":"btn-ghost"}`} onClick={() => setTheme("light")}>☀ {t("light")}</button>
              </div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <button className={`btn btn-sm ${lang==="fr"?"btn-primary":"btn-ghost"}`} onClick={() => setLang("fr")}>🇫🇷 Français</button>
                <button className={`btn btn-sm ${lang==="en"?"btn-primary":"btn-ghost"}`} onClick={() => setLang("en")}>🇬🇧 English</button>
              </div>
            </div>

            {/* Backup */}
            <div className="backup-section">
              <div className="section-title" style={{color:"var(--green)"}}>💾 {t("backupTitle")}</div>
              <div style={{fontSize:".65rem",color:"var(--muted)",lineHeight:1.6}}>{t("backupHint")}</div>
              <div className="backup-actions">
                <button className="btn btn-ghost btn-sm" onClick={exportData}>⬇ {t("exportData")}</button>
                <button className="btn btn-ghost btn-sm" onClick={() => importInputRef.current?.click()}>⬆ {t("importData")}</button>
                <input ref={importInputRef} type="file" accept=".json" style={{display:"none"}} onChange={importData} />

              {backupMsg.text && (
                <div style={{marginTop:12}} className={backupMsg.ok ? "msg-ok" : "msg-err"}>

              )}
            </div>

            {/* Account */}
            <div className="profile-section">
              <div className="section-title">👤 Compte</div>
              <div style={{marginBottom:16,fontSize:".72rem",color:"var(--muted)"}}>
                {lang === "fr" ? "Connecté en tant que" : "Logged in as"} <strong style={{color:"var(--platinum)"}}>{loggedInUser}</strong>
              </div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <button className="btn btn-ghost btn-sm" onClick={handleLogout}>↩ {t("logout")}</button>
                <button className="btn btn-danger btn-sm" onClick={deleteAccount}>🗑 {t("deleteAccount")}</button>
              </div>
            </div>
          </div>
        )}

      </div>

      {/* ── BOTTOM NAV (mobile) ── */}
      <nav className="bottom-nav">
        <div className="bottom-nav-inner">
          <button className={`nav-tab ${activeTab==="home"?"active":""}`} onClick={() => nav("home")}>
            <div className="nav-tab-icon">🏋️</div>
            <div className="nav-tab-label">{t("myPrograms").split(" ")[1] ?? "Programs"}</div>
          </button>
          <button className={`nav-tab ${activeTab==="friends"?"active":""}`} onClick={() => nav("friends")} style={{position:"relative"}}>
            <div className="nav-tab-icon">👥</div>
            <div className="nav-tab-label">{t("friendsBtn")}</div>
            {data.friends.length > 0 && <span className="nav-tab-dot" />}
          </button>
          <button className={`nav-tab ${activeTab==="settings"?"active":""}`} onClick={() => nav("settings")}>
            <div className="nav-tab-icon">⚙️</div>
            <div className="nav-tab-label">{t("settings")}</div>
          </button>
        </div>
      </nav>

      {/* MODAL: Create Program */}
      {modal?.type === "createProgram" && (
        <div className="overlay" onClick={e => e.target===e.currentTarget && closeModal()}>
          <div className="modal">
            <div className="modal-title">{t("newProgTitle")}</div>
            <div className="form-group">
              <label>{t("progName")}</label>
              <input className="input" placeholder={t("progPlaceholder")} value={modal.name}
                onChange={e => setModal(m=>({...m,name:e.target.value}))}
                onKeyDown={e => e.key==="Enter" && createProgram()} autoFocus />
            </div>
            <div className="form-group">
              <label>{t("daysPerWk")} — <span style={{color:"var(--gold)",fontWeight:500}}>{modal.days} {t("daysWk")}</span></label>
              <input type="range" min={1} max={7} value={modal.days} onChange={e => setModal(m=>({...m,days:Number(e.target.value)}))} />
              <div style={{display:"flex",justifyContent:"space-between",fontSize:".58rem",color:"var(--muted)",marginTop:8}}>
                {[1,2,3,4,5,6,7].map(n=><span key={n}>{n}</span>)}
              </div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:24}}>
              <button className="btn btn-primary" onClick={createProgram}>{t("createProg")}</button>
              <button className="btn btn-ghost" onClick={closeModal}>{t("cancel")}</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL: Add Exercise */}
      {modal?.type === "createExo" && (
        <ExercisePickerModal modal={modal} setModal={setModal} onAdd={addExercise} onClose={closeModal} t={t} />
      )}

      {/* MODAL: Log Session */}
      {modal?.type === "log" && (
        <div className="overlay" onClick={e => e.target===e.currentTarget && closeModal()}>
          <div className="modal" style={{maxWidth:500}}>
            <div className="modal-title">{t("logTitle")}</div>
            <div className="form-group">
              <label>{t("date")}</label>
              <input type="date" className="input" value={modal.date} onChange={e => setModal(m=>({...m,date:e.target.value}))} />
            </div>
            <div style={{margin:"20px 0 10px"}}>
              <label>{t("sets")}</label>
              <div style={{display:"grid",gridTemplateColumns:"36px 1fr 1fr auto",gap:8,marginBottom:10}}>
                <div/><div style={{fontSize:".58rem",color:"var(--muted)",letterSpacing:"2px"}}>{t("reps")}</div>
                <div style={{fontSize:".58rem",color:"var(--muted)",letterSpacing:"2px"}}>{t("weightLbl")}</div><div/>
              </div>
              {modal.sets.map((set,i)=>(
                <div key={i} className="set-row" style={{animation:`fadeIn .2s ease ${i*.04}s both`}}>
                  <div className="set-num">{i+1}</div>
                  <input type="number" min={0} className="input" placeholder="12" value={set.reps} onChange={e=>updateSet(i,"reps",e.target.value)} inputMode="numeric" />
                  <input type="number" min={0} step={0.5} className="input" placeholder="80" value={set.weight} onChange={e=>updateSet(i,"weight",e.target.value)} inputMode="decimal" />
                  <button className="btn-icon btn-icon-sm" onClick={()=>removeSet(i)}>✕</button>
                </div>
              ))}
              <button className="btn btn-ghost btn-sm" onClick={addSet} style={{marginTop:10}}>{t("addSet")}</button>
            </div>
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button className="btn btn-primary" onClick={logSession}>{t("saveSess")}</button>
              <button className="btn btn-ghost" onClick={closeModal}>{t("cancel")}</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

/* ── EDITABLE NAME ── */
function EditableName({ value, onChange, t }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value);
  const save = () => { onChange(val); setEditing(false); };
  if (editing) return (
    <div className="input-row" style={{marginBottom:24}}>
      <input className="input" value={val} onChange={e=>setVal(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape")setEditing(false);}} autoFocus />
      <button className="btn btn-primary btn-sm" onClick={save}>{t("save")}</button>
      <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(false)}>✕</button>
    </div>
  );
  return <div style={{marginBottom:24}}><button className="btn btn-ghost btn-sm" onClick={()=>{setVal(value);setEditing(true);}}>{t("renameDay")}</button></div>;
}

function ExercisePickerModal({ modal, setModal, onAdd, onClose, t }) {
  const [search, setSearch] = useState("");
  const [activeGroup, setActiveGroup] = useState("All");
  const filtered = LIBRARY.map(g => ({...g, exercises:g.exercises.filter(e => e.toLowerCase().includes(search.toLowerCase()) && (activeGroup==="All"||activeGroup===g.group))})).filter(g=>g.exercises.length>0);
  const allGroups = ["All",...LIBRARY.map(g=>g.group)];
  const select = (name) => setModal(m=>({...m,name}));
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:620,padding:"24px 0 0",display:"flex",flexDirection:"column",height:"90vh",maxHeight:"90vh"}}>
        <div style={{padding:"0 24px 16px",borderBottom:"1px solid var(--border)",flexShrink:0}}>
          <div className="modal-title" style={{marginBottom:14}}>{t("addExo")}</div>
          <input className="input" placeholder="🔍  Search or type your own…" value={modal.name}
            onChange={e=>{setModal(m=>({...m,name:e.target.value}));setSearch(e.target.value);}}
            onKeyDown={e=>e.key==="Enter"&&modal.name.trim()&&onAdd()} autoFocus style={{marginBottom:12}} />
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {allGroups.map(g=>(
              <button key={g} onClick={()=>setActiveGroup(g)} style={{
                padding:"5px 12px",border:"1px solid",borderRadius:"20px",fontSize:".58rem",
                letterSpacing:"1px",cursor:"pointer",fontFamily:"var(--font-body)",fontWeight:500,
                transition:"var(--transition)",
                background:activeGroup===g?"var(--gold)":"transparent",
                color:activeGroup===g?"#1a1828":"var(--muted)",
                borderColor:activeGroup===g?"var(--gold)":"var(--border)",
                minHeight:32,
              }}>{g==="All"?"✦ All":g}</button>
            ))}
          </div>
        </div>
        <div style={{overflowY:"auto",flex:1,padding:"14px 24px"}}>
          {filtered.length===0 ? (
            <div style={{textAlign:"center",padding:"40px 0",color:"var(--muted)"}}>
              <div style={{fontSize:"1.5rem",marginBottom:8}}>✦</div>
              <div style={{fontSize:".65rem",letterSpacing:"3px",textTransform:"uppercase"}}>No match — press Enter to add yours</div>
            </div>
          ) : filtered.map(g=>(
            <div key={g.group} style={{marginBottom:18}}>
              <div style={{fontSize:".58rem",letterSpacing:"3px",textTransform:"uppercase",color:g.color,marginBottom:8,fontWeight:500,display:"flex",alignItems:"center",gap:8}}>
                <span style={{flex:1,height:"1px",background:`linear-gradient(90deg,${g.color}44,transparent)`}} />{g.group}<span style={{flex:1,height:"1px",background:`linear-gradient(270deg,${g.color}44,transparent)`}} />
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {g.exercises.map(e=>(
                  <button key={e} onClick={()=>select(e)} style={{
                    padding:"7px 14px",border:"1px solid",borderRadius:"2px",fontSize:".68rem",cursor:"pointer",
                    fontFamily:"var(--font-body)",fontWeight:modal.name===e?600:300,transition:"all .2s",
                    background:modal.name===e?`${g.color}22`:"var(--surface)",
                    color:modal.name===e?g.color:"var(--muted)",
                    borderColor:modal.name===e?g.color:"var(--border)",
                    boxShadow:modal.name===e?`0 0 12px ${g.color}33`:"none",
                    minHeight:36,
                  }}>{e}</button>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div style={{padding:"14px 24px",borderTop:"1px solid var(--border)",flexShrink:0,display:"flex",gap:10,alignItems:"center"}}>
          {modal.name.trim() && <div style={{flex:1,fontSize:".65rem",color:"var(--gold)",letterSpacing:"1px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>✦ {modal.name}</div>}
          <button className="btn btn-primary" onClick={onAdd} style={{marginLeft:"auto"}} disabled={!modal.name.trim()}>{t("addExo")}</button>
          <button className="btn btn-ghost" onClick={onClose}>{t("cancel")}</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
