<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TrackFit</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;
  --bg2:#0d0d1a;
  --surface:rgba(255,255,255,0.03);
  --surface2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);
  --border-hover:rgba(255,255,255,0.18);
  --gold:#c9a84c;
  --gold2:#e8cc7a;
  --gold-glow:rgba(201,168,76,0.15);
  --platinum:#e8e8f0;
  --muted:rgba(232,232,240,0.4);
  --muted2:rgba(232,232,240,0.25);
  --text:#e8e8f0;
  --accent:#c9a84c;
  --red:#e05c5c;
  --font-display:'Cormorant Garamond',serif;
  --font-body:'Outfit',sans-serif;
  --radius:2px;
  --transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
}

html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  overflow-x:hidden;
}

/* BACKGROUND FX */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(201,168,76,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 110%, rgba(100,80,200,0.05) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.025;pointer-events:none;z-index:0;
}

#root{position:relative;z-index:1}

.app{max-width:900px;margin:0 auto;padding:0 24px 100px}

/* HEADER */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:36px 0 28px;
  border-bottom:1px solid var(--border);
  margin-bottom:48px;
  position:relative;
}
.header::after{
  content:'';position:absolute;bottom:-1px;left:0;width:80px;height:1px;
  background:linear-gradient(90deg,var(--gold),transparent);
}
.logo{
  font-family:var(--font-display);
  font-size:2.2rem;
  font-weight:300;
  letter-spacing:8px;
  color:var(--platinum);
  cursor:pointer;
  position:relative;
}
.logo span{color:var(--gold);}
.logo-sub{font-size:.6rem;color:var(--muted);letter-spacing:5px;text-transform:uppercase;margin-top:3px;font-weight:300;}

.breadcrumb{display:flex;align-items:center;gap:8px;font-size:.7rem;color:var(--muted);letter-spacing:1px;flex-wrap:wrap;}
.bc-link{color:var(--gold);cursor:pointer;transition:var(--transition);opacity:0.8;}
.bc-link:hover{opacity:1;}
.bc-sep{color:var(--muted2);}

/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 24px;border:none;cursor:pointer;
  font-family:var(--font-body);font-size:.72rem;font-weight:500;
  letter-spacing:2px;text-transform:uppercase;
  transition:var(--transition);position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,0);
  transition:background 0.2s;
}
.btn:hover::after{background:rgba(255,255,255,0.06);}

.btn-primary{
  background:linear-gradient(135deg,var(--gold),#a8862e);
  color:#080810;font-weight:600;
  box-shadow:0 0 30px rgba(201,168,76,0.2);
}
.btn-primary:hover{
  box-shadow:0 0 50px rgba(201,168,76,0.35);
  transform:translateY(-1px);
}
.btn-ghost{
  background:var(--surface);
  color:var(--muted);
  border:1px solid var(--border);
}
.btn-ghost:hover{border-color:var(--border-hover);color:var(--text);}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(224,92,92,0.3);}
.btn-danger:hover{background:rgba(224,92,92,0.1);}
.btn-sm{padding:7px 16px;font-size:.65rem;}
.btn-icon{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:.9rem;padding:6px;transition:var(--transition);}
.btn-icon:hover{color:var(--red);transform:scale(1.1);}

/* INPUTS */
.input{
  width:100%;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  color:var(--text);
  font-family:var(--font-body);
  font-size:.8rem;font-weight:300;
  padding:12px 16px;
  outline:none;
  transition:var(--transition);
  border-radius:var(--radius);
}
.input:focus{border-color:var(--gold);background:rgba(201,168,76,0.04);box-shadow:0 0 0 3px rgba(201,168,76,0.06);}
.input::placeholder{color:var(--muted2);}
.input-row{display:flex;gap:8px;align-items:flex-end;}
label{display:block;font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:400;}

/* SECTION */
.page-title{
  font-family:var(--font-display);
  font-size:3.5rem;
  font-weight:300;
  letter-spacing:3px;
  line-height:1;
  margin-bottom:6px;
  background:linear-gradient(135deg,var(--platinum) 60%,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.page-sub{font-size:.65rem;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-bottom:40px;font-weight:300;}

/* CARDS */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  padding:24px 28px;
  margin-bottom:12px;
  transition:var(--transition);
  border-radius:var(--radius);
  position:relative;
  overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.3),transparent);
  opacity:0;transition:opacity 0.35s;
}
.card-click{cursor:pointer;}
.card-click:hover{
  border-color:var(--border-hover);
  background:var(--surface2);
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,0.3),0 0 0 1px rgba(201,168,76,0.05);
}
.card-click:hover::before{opacity:1;}
.card-click:active{transform:translateY(0);}
.card-header{display:flex;align-items:center;justify-content:space-between;}
.card-title{
  font-family:var(--font-display);
  font-size:1.6rem;font-weight:400;
  letter-spacing:1px;color:var(--platinum);
}
.card-meta{font-size:.63rem;color:var(--muted);letter-spacing:1px;margin-top:6px;}

/* TAGS */
.tag{
  display:inline-flex;align-items:center;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  color:var(--muted);
  font-size:.58rem;letter-spacing:2px;
  padding:3px 10px;text-transform:uppercase;
  margin-right:6px;border-radius:20px;
  font-weight:400;
}
.tag-gold{
  background:rgba(201,168,76,0.08);
  border-color:rgba(201,168,76,0.25);
  color:var(--gold2);
}

/* DAYS GRID */
.days-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:36px;}
.day-card{
  background:var(--surface);
  border:1px solid var(--border);
  padding:22px 20px 18px;
  cursor:pointer;
  transition:var(--transition);
  position:relative;overflow:hidden;
  min-height:100px;
  border-radius:var(--radius);
}
.day-card::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),transparent);
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
.day-card:hover{border-color:rgba(201,168,76,0.25);background:var(--surface2);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.4);}
.day-card:hover::after{transform:scaleX(1);}
.day-num-bg{
  position:absolute;bottom:-10px;right:8px;
  font-family:var(--font-display);font-size:4.5rem;font-weight:300;
  color:rgba(255,255,255,0.03);line-height:1;
  transition:var(--transition);pointer-events:none;
  letter-spacing:-2px;
}
.day-card:hover .day-num-bg{color:rgba(201,168,76,0.08);}
.day-card-name{font-size:.75rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;color:var(--platinum);}
.day-card-count{font-size:.62rem;color:var(--muted);font-weight:300;}

/* EXERCISE ROW */
.exo-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 0;border-bottom:1px solid var(--border);
  cursor:pointer;transition:var(--transition);
}
.exo-row:last-child{border-bottom:none;}
.exo-row:hover{padding-left:10px;}
.exo-row:hover .exo-arrow{color:var(--gold);transform:translateX(3px);}
.exo-name{font-size:.82rem;font-weight:500;letter-spacing:.5px;color:var(--platinum);}
.exo-info{font-size:.62rem;color:var(--muted);margin-top:3px;font-weight:300;}
.exo-arrow{color:var(--muted2);transition:var(--transition);font-size:.8rem;}

/* STATS */
.stats-row{display:flex;gap:10px;margin-bottom:32px;flex-wrap:wrap;}
.stat-box{
  background:var(--surface);
  border:1px solid var(--border);
  padding:18px 22px;flex:1;min-width:90px;
  border-radius:var(--radius);
  transition:var(--transition);
  position:relative;overflow:hidden;
}
.stat-box::before{
  content:'';position:absolute;top:0;left:0;width:2px;height:100%;
  background:linear-gradient(180deg,var(--gold),transparent);
  opacity:0.4;
}
.stat-box:hover{border-color:rgba(201,168,76,0.2);transform:translateY(-2px);}
.stat-value{
  font-family:var(--font-display);
  font-size:2.2rem;font-weight:400;
  color:var(--gold2);letter-spacing:1px;line-height:1;
}
.stat-unit{font-size:1rem;color:var(--gold);opacity:0.7;}
.stat-label{font-size:.58rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:6px;font-weight:300;}

/* LOG TABLE */
.log-table{width:100%;border-collapse:collapse;margin-bottom:16px;}
.log-table th{
  font-size:.58rem;letter-spacing:3px;text-transform:uppercase;
  color:var(--muted);text-align:left;padding:8px 12px;
  border-bottom:1px solid var(--border);font-weight:400;
}
.log-table td{padding:12px 12px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:.78rem;font-weight:300;}
.log-table tr:last-child td{border-bottom:none;}
.log-table .num{font-weight:500;color:var(--gold2);}

/* HISTORY */
.history-session{
  border:1px solid var(--border);padding:20px 24px;
  margin-bottom:10px;background:var(--surface);
  border-radius:var(--radius);transition:var(--transition);
  animation:slideIn 0.3s ease both;
}
.history-session:hover{border-color:var(--border-hover);}
.history-date{
  font-size:.62rem;letter-spacing:3px;color:var(--gold);
  text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:10px;font-weight:400;
}

/* PR BADGE */
.pr-badge{
  background:linear-gradient(135deg,var(--gold),#a8862e);
  color:#080810;font-size:.5rem;font-weight:700;
  letter-spacing:1.5px;padding:3px 8px;border-radius:20px;
  text-transform:uppercase;
  box-shadow:0 0 12px rgba(201,168,76,0.4);
  animation:prPulse 2s ease infinite;
}
@keyframes prPulse{0%,100%{box-shadow:0 0 12px rgba(201,168,76,0.4)}50%{box-shadow:0 0 20px rgba(201,168,76,0.7)}}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:16px;opacity:0.4;}
.empty-text{font-size:.65rem;letter-spacing:4px;text-transform:uppercase;font-weight:300;}

/* MODAL */
.overlay{
  position:fixed;inset:0;
  background:rgba(4,4,12,0.85);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  z-index:100;padding:20px;
  animation:fadeOverlay 0.2s ease;
}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
.modal{
  background:#0f0f1e;
  border:1px solid var(--border);
  padding:36px;width:100%;max-width:480px;
  max-height:90vh;overflow-y:auto;
  border-radius:var(--radius);
  position:relative;
  box-shadow:0 40px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(201,168,76,0.08);
  animation:modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(0.96) translateY(10px)}to{opacity:1;transform:none}}
.modal::before{
  content:'';position:absolute;top:0;left:36px;right:36px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0.4;
}
.modal-title{
  font-family:var(--font-display);
  font-size:2rem;font-weight:300;letter-spacing:3px;
  margin-bottom:28px;color:var(--platinum);
}

/* SET ROW */
.set-row{display:grid;grid-template-columns:36px 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px;}
.set-num{font-size:.62rem;color:var(--muted);text-align:center;font-weight:300;}

/* DIVIDER */
.divider{border:none;border-top:1px solid var(--border);margin:28px 0;}
.form-group{margin-bottom:18px;}
.accent-bar{width:32px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin-bottom:16px;}

/* ANIMATIONS */
.fade-in{animation:fadeIn 0.4s cubic-bezier(0.4,0,0.2,1) both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.slide-in{animation:slideIn 0.3s ease both;}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}

/* STAGGER */
.stagger > *{animation:fadeIn 0.4s cubic-bezier(0.4,0,0.2,1) both;}
.stagger > *:nth-child(1){animation-delay:0.05s}
.stagger > *:nth-child(2){animation-delay:0.1s}
.stagger > *:nth-child(3){animation-delay:0.15s}
.stagger > *:nth-child(4){animation-delay:0.2s}
.stagger > *:nth-child(5){animation-delay:0.25s}
.stagger > *:nth-child(6){animation-delay:0.3s}
.stagger > *:nth-child(7){animation-delay:0.35s}

/* RANGE */
input[type=range]{
  width:100%;margin-top:10px;
  -webkit-appearance:none;appearance:none;
  height:2px;background:var(--border);border-radius:2px;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:var(--gold);cursor:pointer;
  box-shadow:0 0 10px rgba(201,168,76,0.4);
  transition:box-shadow 0.2s;
}
input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 20px rgba(201,168,76,0.6);}
input[type=date]{color-scheme:dark;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.2);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:rgba(201,168,76,0.4);}

/* LOADING */
.loader{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:999;
  animation:loaderFade 0.4s 0.5s ease forwards;
}
@keyframes loaderFade{to{opacity:0;pointer-events:none}}
.loader-logo{
  font-family:var(--font-display);font-size:3rem;
  font-weight:300;letter-spacing:12px;
  color:var(--gold);
  animation:logoPulse 0.5s ease;
}
@keyframes logoPulse{from{opacity:0;letter-spacing:20px}to{opacity:1;letter-spacing:12px}}

/* GOLD LINE SEPARATOR */
.gold-line{
  width:100%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.3),transparent);
  margin:32px 0;
}

/* ARROW right */
.arrow-right{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border:1px solid var(--border);
  color:var(--muted);font-size:.7rem;
  transition:var(--transition);border-radius:50%;
}
.card-click:hover .arrow-right{border-color:var(--gold);color:var(--gold);box-shadow:0 0 12px rgba(201,168,76,0.2);}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const STORAGE_KEY = "replog_v2";
const load = () => { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; } };
const save = (d) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} };
const uid = () => Math.random().toString(36).slice(2, 9);
const today = () => new Date().toISOString().slice(0, 10);
const fmt = (d) => new Date(d + "T00:00:00").toLocaleDateString("fr-FR", { day: "2-digit", month: "short", year: "numeric" });

// Animated counter
function Counter({ value, unit = "" }) {
  const [display, setDisplay] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    let start = 0, end = parseFloat(value) || 0, dur = 800;
    if (ref.current) clearInterval(ref.current);
    const step = end / (dur / 16);
    ref.current = setInterval(() => {
      start += step;
      if (start >= end) { setDisplay(end); clearInterval(ref.current); }
      else setDisplay(Math.floor(start));
    }, 16);
    return () => clearInterval(ref.current);
  }, [value]);
  return <>{display}{unit}</>;
}

function App() {
  const [data, setData] = useState(() => load() || { programs: [] });
  const [view, setView] = useState({ page: "home" });
  const [modal, setModal] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => { setTimeout(() => setLoading(false), 900); }, []);
  useEffect(() => { save(data); }, [data]);

  const upd = (fn) => setData(p => { const n = JSON.parse(JSON.stringify(p)); fn(n); return n; });
  const prog = view.programId ? data.programs.find(p => p.id === view.programId) : null;
  const day = prog && view.dayId ? prog.days.find(d => d.id === view.dayId) : null;
  const exo = day && view.exoId ? day.exercises.find(e => e.id === view.exoId) : null;
  const nav = (page, extra = {}) => setView({ page, ...extra });

  const closeModal = () => setModal(null);

  const createProgram = () => {
    if (!modal.name.trim()) return;
    const days = Array.from({ length: modal.days }, (_, i) => ({ id: uid(), index: i, name: `Session ${i + 1}`, exercises: [] }));
    upd(d => d.programs.push({ id: uid(), name: modal.name.trim(), daysPerWeek: modal.days, days, createdAt: today() }));
    closeModal();
  };

  const deleteProgram = (pid) => { upd(d => { d.programs = d.programs.filter(p => p.id !== pid); }); nav("home"); };
  const updateDayName = (dayId, name) => upd(d => { const p = d.programs.find(p => p.id === view.programId); p.days.find(dd => dd.id === dayId).name = name; });

  const addExercise = () => {
    if (!modal.name.trim()) return;
    upd(d => { const p = d.programs.find(p => p.id === view.programId); const day = p.days.find(dd => dd.id === view.dayId); day.exercises.push({ id: uid(), name: modal.name.trim(), sessions: [] }); });
    closeModal();
  };

  const deleteExercise = () => {
    upd(d => { const p = d.programs.find(p => p.id === view.programId); const day = p.days.find(dd => dd.id === view.dayId); day.exercises = day.exercises.filter(e => e.id !== view.exoId); });
    nav("day", { programId: view.programId, dayId: view.dayId });
  };

  const logSession = () => {
    const validSets = modal.sets.filter(s => s.reps !== "" && s.weight !== "").map(s => ({ reps: Number(s.reps), weight: Number(s.weight) }));
    if (!validSets.length) return;
    upd(d => { const p = d.programs.find(p => p.id === view.programId); const day = p.days.find(dd => dd.id === view.dayId); const e = day.exercises.find(e => e.id === view.exoId); e.sessions.push({ id: uid(), date: modal.date, sets: validSets }); });
    closeModal();
  };

  const deleteSession = (sessionId) => upd(d => { const p = d.programs.find(p => p.id === view.programId); const day = p.days.find(dd => dd.id === view.dayId); const e = day.exercises.find(e => e.id === view.exoId); e.sessions = e.sessions.filter(s => s.id !== sessionId); });

  const addSet = () => setModal(m => ({ ...m, sets: [...m.sets, { reps: "", weight: "" }] }));
  const removeSet = (i) => setModal(m => ({ ...m, sets: m.sets.filter((_, idx) => idx !== i) }));
  const updateSet = (i, f, v) => setModal(m => { const sets = [...m.sets]; sets[i] = { ...sets[i], [f]: v }; return { ...m, sets }; });

  const isPR = (session, all) => {
    const mx = Math.max(...session.sets.map(s => s.weight));
    const prior = all.filter(s => s.id !== session.id && new Date(s.date) <= new Date(session.date) && s.id !== session.id).flatMap(s => s.sets.map(st => st.weight));
    const prevSessions = all.filter(s => s.id !== session.id);
    if (!prevSessions.length) return true;
    const prevMax = Math.max(...prevSessions.flatMap(s => s.sets.map(st => st.weight)));
    return mx > prevMax;
  };

  const openLog = () => {
    const last = exo?.sessions?.[exo.sessions.length - 1];
    const sets = last ? last.sets.map(s => ({ reps: s.reps, weight: s.weight })) : [{ reps: "", weight: "" }];
    setModal({ type: "log", date: today(), sets });
  };

  return (
    <>
      {loading && <div className="loader"><div className="loader-logo">TrackFit</div></div>}

      <div className="app">
        {/* HEADER */}
        <header className="header">
          <div>
            <div className="logo" onClick={() => nav("home")}>Track<span>Fit</span></div>
            <div className="logo-sub">Performance Tracking</div>
          </div>
          {view.page !== "home" && (
            <div className="breadcrumb">
              <span className="bc-link" onClick={() => nav("home")}>Programs</span>
              {prog && <><span className="bc-sep">›</span><span className="bc-link" onClick={() => nav("program", { programId: prog.id })}>{prog.name}</span></>}
              {day && <><span className="bc-sep">›</span><span className="bc-link" onClick={() => nav("day", { programId: prog.id, dayId: day.id })}>{day.name}</span></>}
              {exo && <><span className="bc-sep">›</span><span style={{color:"var(--muted)"}}>{exo.name}</span></>}
            </div>
          )}
        </header>

        {/* HOME */}
        {view.page === "home" && (
          <div className="fade-in">
            <div className="accent-bar" />
            <div className="page-title">MY PROGRAMS</div>
            <div className="page-sub">Manage your training plans</div>

            {data.programs.length === 0 ? (
              <div className="empty"><div className="empty-icon">🏆</div><div className="empty-text">No program yet — create your first</div></div>
            ) : (
              <div className="stagger">
                {data.programs.map(p => (
                  <div key={p.id} className="card card-click" onClick={() => nav("program", { programId: p.id })}>
                    <div className="card-header">
                      <div>
                        <div className="card-title">{p.name}</div>
                        <div className="card-meta" style={{marginTop:8}}>
                          <span className="tag tag-gold">{p.daysPerWeek} days / week</span>
                          <span className="tag">{p.days.reduce((a, d) => a + d.exercises.length, 0)} exercises</span>
                          <span className="tag">since {fmt(p.createdAt)}</span>
                        </div>
                      </div>
                      <div className="arrow-right">›</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
            <div style={{marginTop:28}}>
              <button className="btn btn-primary" onClick={() => setModal({ type: "createProgram", name: "", days: 4 })}>+ New Program</button>
            </div>
          </div>
        )}

        {/* PROGRAM */}
        {view.page === "program" && prog && (
          <div className="fade-in">
            <div className="accent-bar" />
            <div className="page-title">{prog.name}</div>
            <div className="page-sub">{prog.daysPerWeek} training days per week</div>
            <div className="stats-row stagger">
              <div className="stat-box"><div className="stat-value"><Counter value={prog.daysPerWeek} /></div><div className="stat-label">Days / week</div></div>
              <div className="stat-box"><div className="stat-value"><Counter value={prog.days.reduce((a, d) => a + d.exercises.length, 0)} /></div><div className="stat-label">Exercises</div></div>
              <div className="stat-box"><div className="stat-value"><Counter value={prog.days.reduce((a, d) => a + d.exercises.reduce((b, e) => b + e.sessions.length, 0), 0)} /></div><div className="stat-label">Sessions logged</div></div>
            </div>
            <div style={{fontSize:".6rem",letterSpacing:"3px",textTransform:"uppercase",color:"var(--muted)",marginBottom:14,fontWeight:300}}>Select a session</div>
            <div className="days-grid stagger">
              {prog.days.map(d => (
                <div key={d.id} className="day-card" onClick={() => nav("day", { programId: prog.id, dayId: d.id })}>
                  <div className="day-card-name">{d.name}</div>
                  <div className="day-card-count">{d.exercises.length} exercise{d.exercises.length !== 1 ? "s" : ""}</div>
                  <div className="day-num-bg">{d.index + 1}</div>
                </div>
              ))}
            </div>
            <div className="gold-line" />
            <button className="btn btn-danger btn-sm" onClick={() => { if (window.confirm("Delete this program?")) deleteProgram(prog.id); }}>Delete program</button>
          </div>
        )}

        {/* DAY */}
        {view.page === "day" && day && (
          <div className="fade-in">
            <div className="accent-bar" />
            <div className="page-title">{day.name}</div>
            <div className="page-sub">{prog.name} · {day.exercises.length} exercise{day.exercises.length !== 1 ? "s" : ""}</div>
            <EditableName value={day.name} onChange={name => updateDayName(day.id, name)} />
            {day.exercises.length === 0 ? (
              <div className="empty"><div className="empty-icon">📋</div><div className="empty-text">Add your first exercise</div></div>
            ) : (
              <div className="card stagger" style={{padding:"0 28px"}}>
                {day.exercises.map(e => {
                  const last = e.sessions[e.sessions.length - 1];
                  const total = e.sessions.reduce((a, s) => a + s.sets.length, 0);
                  return (
                    <div key={e.id} className="exo-row" onClick={() => nav("exercise", { programId: prog.id, dayId: day.id, exoId: e.id })}>
                      <div>
                        <div className="exo-name">{e.name}</div>
                        <div className="exo-info">{e.sessions.length} session{e.sessions.length !== 1 ? "s" : ""} · {total} set{total !== 1 ? "s" : ""}{last ? ` · last: ${fmt(last.date)}` : ""}</div>
                      </div>
                      <span className="exo-arrow">›</span>
                    </div>
                  );
                })}
              </div>
            )}
            <div style={{marginTop:24}}>
              <button className="btn btn-primary" onClick={() => setModal({ type: "createExo", name: "" })}>+ Add exercise</button>
            </div>
          </div>
        )}

        {/* EXERCISE */}
        {view.page === "exercise" && exo && (() => {
          const allW = exo.sessions.flatMap(s => s.sets.map(st => st.weight));
          const maxW = allW.length ? Math.max(...allW) : 0;
          const totalSets = exo.sessions.reduce((a, s) => a + s.sets.length, 0);
          const lastS = exo.sessions[exo.sessions.length - 1];
          const lastMax = lastS ? Math.max(...lastS.sets.map(s => s.weight)) : 0;
          return (
            <div className="fade-in">
              <div className="accent-bar" />
              <div className="page-title">{exo.name}</div>
              <div className="page-sub">{day.name} · {exo.sessions.length} session{exo.sessions.length !== 1 ? "s" : ""}</div>
              {exo.sessions.length > 0 && (
                <div className="stats-row stagger">
                  <div className="stat-box"><div className="stat-value"><Counter value={maxW} /><span className="stat-unit"> kg</span></div><div className="stat-label">Personal Record</div></div>
                  <div className="stat-box"><div className="stat-value"><Counter value={totalSets} /></div><div className="stat-label">Total sets</div></div>
                  <div className="stat-box"><div className="stat-value"><Counter value={lastMax} /><span className="stat-unit"> kg</span></div><div className="stat-label">Last session</div></div>
                  <div className="stat-box"><div className="stat-value"><Counter value={exo.sessions.length} /></div><div className="stat-label">Sessions</div></div>
                </div>
              )}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                <div style={{fontSize:".6rem",letterSpacing:"3px",textTransform:"uppercase",color:"var(--muted)",fontWeight:300}}>Session History</div>
                <button className="btn btn-primary btn-sm" onClick={openLog}>+ Log session</button>
              </div>
              {exo.sessions.length === 0 ? (
                <div className="empty"><div className="empty-icon">📊</div><div className="empty-text">No session logged yet</div></div>
              ) : (
                <div className="stagger">
                  {[...exo.sessions].reverse().map(session => {
                    const pr = isPR(session, exo.sessions);
                    const mW = Math.max(...session.sets.map(s => s.weight));
                    const tR = session.sets.reduce((a, s) => a + s.reps, 0);
                    const vol = session.sets.reduce((a, s) => a + s.reps * s.weight, 0);
                    return (
                      <div key={session.id} className="history-session">
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                          <div className="history-date">
                            {fmt(session.date)}
                            {pr && <span className="pr-badge">⚡ PR</span>}
                          </div>
                          <button className="btn-icon" onClick={() => { if (window.confirm("Delete this session?")) deleteSession(session.id); }}>✕</button>
                        </div>
                        <table className="log-table">
                          <thead><tr><th>Set</th><th>Reps</th><th>Weight</th><th>Volume</th></tr></thead>
                          <tbody>
                            {session.sets.map((set, i) => (
                              <tr key={i}>
                                <td style={{color:"var(--muted)",fontSize:".7rem"}}>{i + 1}</td>
                                <td className="num">{set.reps}</td>
                                <td className="num">{set.weight} kg</td>
                                <td style={{color:"var(--muted)",fontSize:".7rem"}}>{(set.reps * set.weight).toLocaleString("fr")} kg</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                        <div style={{fontSize:".6rem",color:"var(--muted2)",display:"flex",gap:20,flexWrap:"wrap",fontWeight:300}}>
                          <span>{session.sets.length} sets · {tR} total reps · {mW} kg max</span>
                          <span style={{color:"var(--gold)",opacity:.7}}>Volume: {vol.toLocaleString("fr")} kg</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              <div className="gold-line" />
              <button className="btn btn-danger btn-sm" onClick={() => { if (window.confirm("Delete this exercise?")) deleteExercise(); }}>Delete exercise</button>
            </div>
          );
        })()}
      </div>

      {/* MODAL: Create Program */}
      {modal?.type === "createProgram" && (
        <div className="overlay" onClick={e => e.target === e.currentTarget && closeModal()}>
          <div className="modal">
            <div className="modal-title">New Program</div>
            <div className="form-group">
              <label>Program name</label>
              <input className="input" placeholder="e.g. PPL, Push Pull Legs, Full Body…" value={modal.name}
                onChange={e => setModal(m => ({ ...m, name: e.target.value }))}
                onKeyDown={e => e.key === "Enter" && createProgram()} autoFocus />
            </div>
            <div className="form-group">
              <label>Days per week — <span style={{color:"var(--gold)",fontWeight:500}}>{modal.days} days</span></label>
              <input type="range" min={1} max={7} value={modal.days}
                onChange={e => setModal(m => ({ ...m, days: Number(e.target.value) }))} />
              <div style={{display:"flex",justifyContent:"space-between",fontSize:".58rem",color:"var(--muted)",marginTop:8,letterSpacing:"1px"}}>
                {[1,2,3,4,5,6,7].map(n => <span key={n}>{n}</span>)}
              </div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:28}}>
              <button className="btn btn-primary" onClick={createProgram}>Create Program</button>
              <button className="btn btn-ghost" onClick={closeModal}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL: Add Exercise */}
      {modal?.type === "createExo" && (
        <ExercisePickerModal
          modal={modal}
          setModal={setModal}
          onAdd={addExercise}
          onClose={closeModal}
        />
      )}

      {/* MODAL: Log Session */}
      {modal?.type === "log" && (
        <div className="overlay" onClick={e => e.target === e.currentTarget && closeModal()}>
          <div className="modal" style={{maxWidth:500}}>
            <div className="modal-title">Log Session</div>
            <div className="form-group">
              <label>Date</label>
              <input type="date" className="input" value={modal.date}
                onChange={e => setModal(m => ({ ...m, date: e.target.value }))} />
            </div>
            <div style={{margin:"24px 0 10px"}}>
              <label>Sets</label>
              <div style={{display:"grid",gridTemplateColumns:"36px 1fr 1fr auto",gap:8,marginBottom:10}}>
                <div></div>
                <div style={{fontSize:".58rem",color:"var(--muted)",letterSpacing:"2px"}}>REPS</div>
                <div style={{fontSize:".58rem",color:"var(--muted)",letterSpacing:"2px"}}>WEIGHT (kg)</div>
                <div></div>
              </div>
              {modal.sets.map((set, i) => (
                <div key={i} className="set-row" style={{animation:`fadeIn 0.2s ease ${i*0.04}s both`}}>
                  <div className="set-num">{i + 1}</div>
                  <input type="number" min={0} className="input" placeholder="12" value={set.reps}
                    onChange={e => updateSet(i, "reps", e.target.value)} />
                  <input type="number" min={0} step={0.5} className="input" placeholder="80" value={set.weight}
                    onChange={e => updateSet(i, "weight", e.target.value)} />
                  <button className="btn-icon" onClick={() => removeSet(i)}>✕</button>
                </div>
              ))}
              <button className="btn btn-ghost btn-sm" onClick={addSet} style={{marginTop:10}}>+ Add set</button>
            </div>
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button className="btn btn-primary" onClick={logSession}>Save Session</button>
              <button className="btn btn-ghost" onClick={closeModal}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

function EditableName({ value, onChange }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value);
  const save = () => { onChange(val); setEditing(false); };
  if (editing) return (
    <div className="input-row" style={{marginBottom:28}}>
      <input className="input" value={val}
        onChange={e => setVal(e.target.value)}
        onKeyDown={e => { if (e.key === "Enter") save(); if (e.key === "Escape") setEditing(false); }}
        autoFocus />
      <button className="btn btn-primary btn-sm" onClick={save}>Save</button>
      <button className="btn btn-ghost btn-sm" onClick={() => setEditing(false)}>✕</button>
    </div>
  );
  return <div style={{marginBottom:28}}><button className="btn btn-ghost btn-sm" onClick={() => { setVal(value); setEditing(true); }}>✏ Rename session</button></div>;
}

function ExercisePickerModal({ modal, setModal, onAdd, onClose }) {
  const [search, setSearch] = useState("");
  const [activeGroup, setActiveGroup] = useState("All");

  const filtered = LIBRARY.map(g => ({
    ...g,
    exercises: g.exercises.filter(e =>
      e.toLowerCase().includes(search.toLowerCase()) &&
      (activeGroup === "All" || activeGroup === g.group)
    )
  })).filter(g => g.exercises.length > 0);

  const allGroups = ["All", ...LIBRARY.map(g => g.group)];

  const select = (name) => {
    setModal(m => ({ ...m, name }));
  };

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth:620,padding:"28px 0 0",display:"flex",flexDirection:"column",height:"85vh"}}>
        {/* Header */}
        <div style={{padding:"0 28px 20px",borderBottom:"1px solid var(--border)",flexShrink:0}}>
          <div className="modal-title" style={{marginBottom:16}}>Add Exercise</div>
          <input
            className="input"
            placeholder="🔍  Search or type your own exercise…"
            value={modal.name}
            onChange={e => { setModal(m => ({ ...m, name: e.target.value })); setSearch(e.target.value); }}
            onKeyDown={e => e.key === "Enter" && modal.name.trim() && onAdd()}
            autoFocus
            style={{marginBottom:14}}
          />
          {/* Group filter pills */}
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {allGroups.map(g => (
              <button key={g} onClick={() => setActiveGroup(g)} style={{
                padding:"4px 12px",border:"1px solid",borderRadius:"20px",
                fontSize:".58rem",letterSpacing:"1px",cursor:"pointer",
                fontFamily:"var(--font-body)",fontWeight:500,
                transition:"var(--transition)",
                background: activeGroup === g ? "var(--gold)" : "transparent",
                color: activeGroup === g ? "#080810" : "var(--muted)",
                borderColor: activeGroup === g ? "var(--gold)" : "var(--border)",
              }}>
                {g === "All" ? "✦ All" : g}
              </button>
            ))}
          </div>
        </div>

        {/* Exercise list */}
        <div style={{overflowY:"auto",flex:1,padding:"16px 28px"}}>
          {filtered.length === 0 ? (
            <div style={{textAlign:"center",padding:"40px 0",color:"var(--muted)"}}>
              <div style={{fontSize:"1.5rem",marginBottom:8}}>✦</div>
              <div style={{fontSize:".65rem",letterSpacing:"3px",textTransform:"uppercase"}}>No match — press Enter to add yours</div>
            </div>
          ) : filtered.map(g => (
            <div key={g.group} style={{marginBottom:20}}>
              <div style={{
                fontSize:".58rem",letterSpacing:"3px",textTransform:"uppercase",
                color:g.color,marginBottom:8,fontWeight:500,
                display:"flex",alignItems:"center",gap:8,
              }}>
                <span style={{flex:1,height:"1px",background:`linear-gradient(90deg,${g.color}44,transparent)`}} />
                {g.group}
                <span style={{flex:1,height:"1px",background:`linear-gradient(270deg,${g.color}44,transparent)`}} />
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {g.exercises.map(e => (
                  <button key={e} onClick={() => select(e)} style={{
                    padding:"6px 14px",
                    border:"1px solid",
                    borderRadius:"2px",
                    fontSize:".68rem",
                    cursor:"pointer",
                    fontFamily:"var(--font-body)",
                    fontWeight: modal.name === e ? 600 : 300,
                    transition:"all 0.2s",
                    background: modal.name === e ? `${g.color}22` : "rgba(255,255,255,0.02)",
                    color: modal.name === e ? g.color : "var(--muted)",
                    borderColor: modal.name === e ? g.color : "var(--border)",
                    boxShadow: modal.name === e ? `0 0 12px ${g.color}33` : "none",
                    transform: modal.name === e ? "scale(1.03)" : "scale(1)",
                  }}>
                    {e}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>

        {/* Footer */}
        <div style={{padding:"16px 28px",borderTop:"1px solid var(--border)",flexShrink:0,display:"flex",gap:10,alignItems:"center"}}>
          {modal.name.trim() && (
            <div style={{flex:1,fontSize:".65rem",color:"var(--gold)",letterSpacing:"1px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              ✦ {modal.name}
            </div>
          )}
          <button className="btn btn-primary" onClick={onAdd} style={{marginLeft:"auto"}} disabled={!modal.name.trim()}>Add Exercise</button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}
